version: '3.8'

# ═══════════════════════════════════════════════════════════════
# GED Courrier - Version simple pour Portainer (SANS BUILD)
# ═══════════════════════════════════════════════════════════════
# Prérequis sur le serveur:
#   1. Cloner le projet dans /opt/ged
#   2. Builder le frontend: cd frontend && npm install && npm run build
#   3. Déployer cette stack dans Portainer
#
# Mise à jour:
#   git pull && cd frontend && npm run build && docker restart ged-backend

services:
  # ═══════════════════════════════════════════════════════════════
  # MONGODB
  # ═══════════════════════════════════════════════════════════════
  mongodb:
    image: mongo:6
    container_name: ged-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
    volumes:
      - mongodb_data:/data/db
    networks:
      - ged-network

  # ═══════════════════════════════════════════════════════════════
  # GED BACKEND
  # ═══════════════════════════════════════════════════════════════
  ged-backend:
    image: node:18-alpine
    container_name: ged-backend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "cd /app/backend && npm install --omit=dev && node src/server.js"
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/ged_courrier?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=${JWT_EXPIRE:-7d}
      - APP_URL=${APP_URL}
      - APP_NAME=${APP_NAME:-GED Courrier}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - UPLOAD_PATH=/app/uploads
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-50000000}
      # SMTP
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      # LDAP (optionnel)
      - LDAP_ENABLED=${LDAP_ENABLED:-false}
      - LDAP_URL=${LDAP_URL}
      - LDAP_BIND_DN=${LDAP_BIND_DN}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD}
      - LDAP_SEARCH_BASE=${LDAP_SEARCH_BASE}
      - LDAP_SEARCH_FILTER=${LDAP_SEARCH_FILTER}
      # IMAP (optionnel)
      - IMAP_ENABLED=${IMAP_ENABLED:-false}
      - IMAP_HOST=${IMAP_HOST}
      - IMAP_PORT=${IMAP_PORT:-993}
      - IMAP_USER=${IMAP_USER}
      - IMAP_PASSWORD=${IMAP_PASSWORD}
      - IMAP_TLS=${IMAP_TLS:-true}
      - IMAP_MAILBOX=${IMAP_MAILBOX:-INBOX}
      - IMAP_CHECK_INTERVAL=${IMAP_CHECK_INTERVAL:-5}
    volumes:
      # Code source (depuis le serveur)
      - /opt/ged/backend:/app/backend:ro
      - /opt/ged/frontend/dist:/app/frontend/dist:ro
      # Uploads (lecture/écriture)
      - /opt/ged/backend/uploads:/app/uploads
      # Cache node_modules
      - backend_modules:/app/backend/node_modules
    depends_on:
      - mongodb
    networks:
      - ged-network

volumes:
  mongodb_data:
  backend_modules:

networks:
  ged-network:
    driver: bridge
