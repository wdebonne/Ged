# Docker Compose pour le développement SANS MongoDB
# Utilise MongoDB existant sur l'hôte
#
# Usage:
#   docker-compose -f docker-compose.dev.standalone.yml up
#
# MongoDB doit être démarré sur l'hôte (port 27017)

version: '3.8'

services:
  backend:
    image: node:18-alpine
    container_name: ged-backend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=development
      - PORT=5000
      # MongoDB externe via host.docker.internal
      - MONGODB_URI=${MONGODB_URI:-mongodb://host.docker.internal:27017/ged_courrier}
      - JWT_SECRET=${JWT_SECRET:-dev_secret_key_not_for_production}
      - JWT_EXPIRE=${JWT_EXPIRE:-7d}
      - APP_URL=${APP_URL:-http://localhost:5173}
      - APP_NAME=${APP_NAME:-GED Courrier (DEV)}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173,http://127.0.0.1:5173}
      # SMTP (optionnel)
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      # LDAP (optionnel)
      - LDAP_ENABLED=${LDAP_ENABLED:-false}
      - LDAP_URL=${LDAP_URL}
      - LDAP_BIND_DN=${LDAP_BIND_DN}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD}
      - LDAP_SEARCH_BASE=${LDAP_SEARCH_BASE}
      - LDAP_SEARCH_FILTER=${LDAP_SEARCH_FILTER}
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/package.json:/app/package.json:ro
      - ./backend/uploads:/app/uploads
      - backend_node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ged-dev-network

  frontend:
    image: node:18-alpine
    container_name: ged-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_UPLOADS_URL=http://localhost:5000/uploads
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/package.json:/app/package.json:ro
      - ./frontend/vite.config.js:/app/vite.config.js:ro
      - ./frontend/tailwind.config.js:/app/tailwind.config.js:ro
      - ./frontend/postcss.config.js:/app/postcss.config.js:ro
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - ged-dev-network

volumes:
  backend_node_modules:
  frontend_node_modules:

networks:
  ged-dev-network:
