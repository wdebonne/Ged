version: '3.8'

# ═══════════════════════════════════════════════════════════════
# GED Courrier - Docker Compose pour le DÉVELOPPEMENT
# ═══════════════════════════════════════════════════════════════
# Hot-reload activé pour backend et frontend
# Usage: docker-compose -f docker-compose.dev.yml up

services:
  # ═══════════════════════════════════════════════════════════════
  # MONGODB (pour le développement local)
  # ═══════════════════════════════════════════════════════════════
  mongodb:
    image: mongo:6
    container_name: ged-mongodb-dev
    restart: unless-stopped
    ports:
      - '27017:27017'  # Exposé pour accès depuis l'IDE/outils
    volumes:
      - mongodb_dev_data:/data/db
    networks:
      - ged-dev-network

  # ═══════════════════════════════════════════════════════════════
  # BACKEND (avec hot-reload via nodemon)
  # ═══════════════════════════════════════════════════════════════
  backend:
    image: node:18-alpine
    container_name: ged-backend-dev
    working_dir: /app
    command: sh -c "apk add --no-cache python3 make g++ cairo-dev pango-dev jpeg-dev giflib-dev librsvg-dev pixman-dev && npm install && npm run dev"
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/ged_courrier
      - JWT_SECRET=dev_secret_key_not_for_production
      - JWT_EXPIRE=7d
      - APP_URL=http://localhost:5173
      - APP_NAME=GED Courrier (DEV)
      - CORS_ORIGIN=http://localhost:5173,http://127.0.0.1:5173
      - UPLOAD_PATH=./uploads
      - MAX_FILE_SIZE=50000000
    volumes:
      # Monter le code source pour hot-reload
      - ./backend/src:/app/src:ro
      - ./backend/package.json:/app/package.json:ro
      - ./backend/package-lock.json:/app/package-lock.json
      # Volume persistant pour node_modules (évite les conflits OS)
      - backend_node_modules:/app/node_modules
      # Volume persistant pour les uploads
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongodb
    networks:
      - ged-dev-network

  # ═══════════════════════════════════════════════════════════════
  # FRONTEND (avec hot-reload via Vite)
  # ═══════════════════════════════════════════════════════════════
  frontend:
    image: node:18-alpine
    container_name: ged-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_UPLOADS_URL=http://localhost:5000/uploads
    volumes:
      # Monter le code source pour hot-reload
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/package.json:/app/package.json:ro
      - ./frontend/package-lock.json:/app/package-lock.json
      - ./frontend/vite.config.js:/app/vite.config.js:ro
      - ./frontend/tailwind.config.js:/app/tailwind.config.js:ro
      - ./frontend/postcss.config.js:/app/postcss.config.js:ro
      # Volume persistant pour node_modules
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - ged-dev-network

  # ═══════════════════════════════════════════════════════════════
  # MONGO EXPRESS (interface web pour MongoDB) - Optionnel
  # ═══════════════════════════════════════════════════════════════
  mongo-express:
    image: mongo-express:latest
    container_name: ged-mongo-express
    restart: unless-stopped
    ports:
      - '8081:8081'
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin
    depends_on:
      - mongodb
    networks:
      - ged-dev-network
    profiles:
      - tools  # Démarré uniquement avec: docker-compose --profile tools up

volumes:
  mongodb_dev_data:
  backend_node_modules:
  frontend_node_modules:

networks:
  ged-dev-network:
    driver: bridge
